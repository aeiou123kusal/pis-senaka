<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – PIS</title>
  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a2342;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 32px;
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 12px; color: #c9a84c; }
    p  { color: rgba(255,255,255,.7); font-size: .9rem; line-height: 1.6; max-width: 300px; }
    .btn {
      margin-top: 28px;
      background: #c9a84c;
      color: #0a2342;
      border: none;
      border-radius: 10px;
      padding: 13px 28px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>Please check your internet connection and try again. Your data will not be lost.</p>
  <button class="btn" onclick="window.location.reload()">↺ Retry</button>
</body>
</html>
